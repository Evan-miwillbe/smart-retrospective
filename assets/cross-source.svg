<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/>
    </marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="480" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">跨源模式检测 — 单源信号 vs 双源模式</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#64748b">单源只能看到信号（Signal），双源交叉验证才能确认模式（Pattern）</text>

  <!-- ============ Left: 5 Data Sources ============ -->
  <text x="95" y="88" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">5 个数据源</text>

  <!-- IM -->
  <g filter="url(#sh)">
    <rect x="30" y="100" width="130" height="42" rx="8" fill="#3b82f6"/>
  </g>
  <text x="95" y="118" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">IM 群聊</text>
  <text x="95" y="133" text-anchor="middle" font-size="9.5" fill="#bfdbfe">消息 · @关系 · 频率</text>

  <!-- Minutes -->
  <g filter="url(#sh)">
    <rect x="30" y="152" width="130" height="42" rx="8" fill="#6366f1"/>
  </g>
  <text x="95" y="170" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">妙记</text>
  <text x="95" y="185" text-anchor="middle" font-size="9.5" fill="#c7d2fe">决策 · 承诺 · AI</text>

  <!-- Task -->
  <g filter="url(#sh)">
    <rect x="30" y="204" width="130" height="42" rx="8" fill="#0891b2"/>
  </g>
  <text x="95" y="222" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">任务</text>
  <text x="95" y="237" text-anchor="middle" font-size="9.5" fill="#cffafe">状态 · 逾期 · 负责人</text>

  <!-- Doc -->
  <g filter="url(#sh)">
    <rect x="30" y="256" width="130" height="42" rx="8" fill="#7c3aed"/>
  </g>
  <text x="95" y="274" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">文档</text>
  <text x="95" y="289" text-anchor="middle" font-size="9.5" fill="#ddd6fe">创建 · 协作 · 更新</text>

  <!-- Calendar -->
  <g filter="url(#sh)">
    <rect x="30" y="308" width="130" height="42" rx="8" fill="#059669"/>
  </g>
  <text x="95" y="326" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">日历</text>
  <text x="95" y="341" text-anchor="middle" font-size="9.5" fill="#a7f3d0">频率 · 时长 · 参与者</text>

  <!-- ============ Middle: Cross-source connections ============ -->
  <text x="350" y="88" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">跨源交叉验证</text>

  <!-- Connection lines (showing cross-source matching) -->
  <!-- P1: Minutes + IM -->
  <line x1="160" y1="121" x2="240" y2="110" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
  <line x1="160" y1="173" x2="240" y2="110" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>

  <!-- P2: IM + Task -->
  <line x1="160" y1="121" x2="240" y2="158" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
  <line x1="160" y1="225" x2="240" y2="158" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>

  <!-- P3: IM + Doc -->
  <line x1="160" y1="121" x2="240" y2="206" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
  <line x1="160" y1="277" x2="240" y2="206" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>

  <!-- P4: IM + Task + Calendar -->
  <line x1="160" y1="121" x2="240" y2="254" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
  <line x1="160" y1="225" x2="240" y2="254" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
  <line x1="160" y1="329" x2="240" y2="254" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>

  <!-- P5: Calendar + Task -->
  <line x1="160" y1="329" x2="240" y2="302" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
  <line x1="160" y1="225" x2="240" y2="302" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>

  <!-- P6: Minutes + Task -->
  <line x1="160" y1="173" x2="240" y2="350" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
  <line x1="160" y1="225" x2="240" y2="350" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>

  <!-- Crossing nodes (7 patterns) -->
  <!-- P1 -->
  <circle cx="240" cy="110" r="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="240" y="114" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">P1</text>
  <!-- P2 -->
  <circle cx="240" cy="158" r="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="240" y="162" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">P2</text>
  <!-- P3 -->
  <circle cx="240" cy="206" r="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="240" y="210" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">P3</text>
  <!-- P4 -->
  <circle cx="240" cy="254" r="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="240" y="258" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">P4</text>
  <!-- P5 -->
  <circle cx="240" cy="302" r="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="240" y="306" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">P5</text>
  <!-- P6 -->
  <circle cx="240" cy="350" r="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="240" y="354" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">P6</text>
  <!-- P7 (IM only but multi-group) -->
  <circle cx="240" cy="398" r="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="240" y="402" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">P7</text>
  <line x1="160" y1="121" x2="240" y2="398" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>

  <!-- ============ Right: Pattern descriptions ============ -->
  <!-- Arrows from circles to descriptions -->
  <line x1="254" y1="110" x2="300" y2="110" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="254" y1="158" x2="300" y2="158" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="254" y1="206" x2="300" y2="206" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="254" y1="254" x2="300" y2="254" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="254" y1="302" x2="300" y2="302" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="254" y1="350" x2="300" y2="350" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="254" y1="398" x2="300" y2="398" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Pattern cards -->
  <!-- P1 -->
  <g filter="url(#sh)">
    <rect x="308" y="96" width="280" height="30" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  </g>
  <text x="318" y="115" font-size="11" font-weight="700" fill="#92400e">决策漂移</text>
  <text x="390" y="115" font-size="10.5" fill="#64748b">同一议题结论反复翻转</text>

  <!-- P2 -->
  <g filter="url(#sh)">
    <rect x="308" y="144" width="280" height="30" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  </g>
  <text x="318" y="163" font-size="11" font-weight="700" fill="#92400e">沉默瓶颈</text>
  <text x="390" y="163" font-size="10.5" fill="#64748b">信息枢纽拖慢整体进度</text>

  <!-- P3 -->
  <g filter="url(#sh)">
    <rect x="308" y="192" width="280" height="30" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  </g>
  <text x="318" y="211" font-size="11" font-weight="700" fill="#92400e">知识蒸发</text>
  <text x="390" y="211" font-size="10.5" fill="#64748b">讨论未文档化，知识沉没</text>

  <!-- P4 -->
  <g filter="url(#sh)">
    <rect x="308" y="240" width="280" height="30" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  </g>
  <text x="318" y="259" font-size="11" font-weight="700" fill="#92400e">危机前静默</text>
  <text x="407" y="259" font-size="10.5" fill="#64748b">沟通频率下降预示问题</text>

  <!-- P5 -->
  <g filter="url(#sh)">
    <rect x="308" y="288" width="280" height="30" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  </g>
  <text x="318" y="307" font-size="11" font-weight="700" fill="#92400e">会议通胀</text>
  <text x="390" y="307" font-size="10.5" fill="#64748b">会议增加但产出不增</text>

  <!-- P6 -->
  <g filter="url(#sh)">
    <rect x="308" y="336" width="280" height="30" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  </g>
  <text x="318" y="355" font-size="11" font-weight="700" fill="#92400e">承诺衰减</text>
  <text x="390" y="355" font-size="10.5" fill="#64748b">"说了"到"做了"逐步丢失</text>

  <!-- P7 -->
  <g filter="url(#sh)">
    <rect x="308" y="384" width="280" height="30" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  </g>
  <text x="318" y="403" font-size="11" font-weight="700" fill="#92400e">信息孤岛</text>
  <text x="390" y="403" font-size="10.5" fill="#64748b">不同团队结论不同步</text>

  <!-- ============ Far Right: Impact examples ============ -->
  <text x="740" y="88" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">量化影响</text>

  <!-- Impact arrows -->
  <line x1="588" y1="111" x2="630" y2="111" stroke="#10b981" stroke-width="1.5" marker-end="url(#ag)"/>
  <line x1="588" y1="159" x2="630" y2="159" stroke="#10b981" stroke-width="1.5" marker-end="url(#ag)"/>
  <line x1="588" y1="207" x2="630" y2="207" stroke="#10b981" stroke-width="1.5" marker-end="url(#ag)"/>
  <line x1="588" y1="255" x2="630" y2="255" stroke="#10b981" stroke-width="1.5" marker-end="url(#ag)"/>
  <line x1="588" y1="303" x2="630" y2="303" stroke="#10b981" stroke-width="1.5" marker-end="url(#ag)"/>
  <line x1="588" y1="351" x2="630" y2="351" stroke="#10b981" stroke-width="1.5" marker-end="url(#ag)"/>
  <line x1="588" y1="399" x2="630" y2="399" stroke="#10b981" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- Impact boxes -->
  <g filter="url(#sh)">
    <rect x="638" y="98" width="232" height="26" rx="5" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  </g>
  <text x="754" y="116" text-anchor="middle" font-size="10" fill="#065f46">3次翻转 = 团队原地打转</text>

  <g filter="url(#sh)">
    <rect x="638" y="146" width="232" height="26" rx="5" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  </g>
  <text x="754" y="164" text-anchor="middle" font-size="10" fill="#065f46">18h/周 下游等待浪费</text>

  <g filter="url(#sh)">
    <rect x="638" y="194" width="232" height="26" rx="5" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  </g>
  <text x="754" y="212" text-anchor="middle" font-size="10" fill="#065f46">3周后重新讨论同一问题</text>

  <g filter="url(#sh)">
    <rect x="638" y="242" width="232" height="26" rx="5" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  </g>
  <text x="754" y="260" text-anchor="middle" font-size="10" fill="#065f46">提前5天预警能力</text>

  <g filter="url(#sh)">
    <rect x="638" y="290" width="232" height="26" rx="5" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  </g>
  <text x="754" y="308" text-anchor="middle" font-size="10" fill="#065f46">完成率从78%降至65%</text>

  <g filter="url(#sh)">
    <rect x="638" y="338" width="232" height="26" rx="5" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  </g>
  <text x="754" y="356" text-anchor="middle" font-size="10" fill="#065f46">闭环率仅45%</text>

  <g filter="url(#sh)">
    <rect x="638" y="386" width="232" height="26" rx="5" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  </g>
  <text x="754" y="404" text-anchor="middle" font-size="10" fill="#065f46">白干17天无人知</text>

  <!-- Bottom legend -->
  <rect x="30" y="438" width="840" height="32" rx="6" fill="#f1f5f9"/>
  <circle cx="60" cy="454" r="6" fill="#f59e0b"/>
  <text x="74" y="458" font-size="10.5" fill="#64748b">交叉验证节点（需 ≥2 数据源确认）</text>
  <rect x="280" y="448" width="30" height="12" rx="3" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="318" y="458" font-size="10.5" fill="#64748b">量化影响（可追溯证据链）</text>
  <line x1="500" y1="454" x2="530" y2="454" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
  <text x="538" y="458" font-size="10.5" fill="#64748b">数据源 → 模式关联</text>
</svg>